---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-prerequisites
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - path: platform-infra/prerequisites
      repoURL: https://github.com/ekalabs/crossplane-vcluster.git
      # Revision pin scaffold: use a release tag or commit SHA for prod promotion.
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
