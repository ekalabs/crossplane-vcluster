apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: management-crossplane-providers-prereq
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    path: platform-infra/clusters/management/crossplane-providers
    repoURL: https://github.com/ekalabs/crossplane-vcluster.git
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
