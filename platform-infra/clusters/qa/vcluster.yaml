apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: env-qa-vcluster
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    clusterName: env-qa
spec:
  project: default
  sources:
    - path: platform-infra/clusters/qa/ingress
      repoURL: https://github.com/ekalabs/crossplane-vcluster.git
      targetRevision: HEAD
    
    - repoURL: https://charts.loft.sh
      targetRevision: 0.22.0
      chart: vcluster
      helm:
        releaseName: env-qa
        values: |
          pro: false
          exportKubeConfig:
            context: env-qa
            server: https://env-qa.appfactory.local:32443
            secret:
              name: vc-env-qa-ext
              namespace: env-qa
          sync:
            toHost:
              ingresses:
                enabled: true
          controlPlane:
            distro:
              k3s:
                enabled: true
            proxy:
              extraSANs:
              - env-qa
              - env-qa.env-qa
              - env-qa.env-qa.svc
              - env-qa.env-qa.svc.cluster.local
            statefulSet:
              scheduling:
                podManagementPolicy: OrderedReady
                    
  destination:
    server: https://kubernetes.default.svc
    namespace: env-qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true