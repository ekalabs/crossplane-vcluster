apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: env-management-vcluster
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    clusterName: env-management
spec:
  project: default
  sources:
    - path: platform-infra/clusters/management/ingress
      repoURL: https://github.com/ekalabs/crossplane-vcluster.git
      targetRevision: feat/argo-crossplane-preview-qa-stage-prod-migration

    - repoURL: https://charts.loft.sh
      targetRevision: 0.22.0
      chart: vcluster
      helm:
        releaseName: env-management
        values: |
          pro: false
          exportKubeConfig:
            context: env-management
            server: https://env-management.appfactory.local:32443
            secret:
              name: vc-env-management-ext
              namespace: env-management
          sync:
            toHost:
              ingresses:
                enabled: true
          controlPlane:
            distro:
              k3s:
                enabled: true
            proxy:
              extraSANs:
              - env-management
              - env-management.env-management
              - env-management.env-management.svc
              - env-management.env-management.svc.cluster.local
            statefulSet:
              scheduling:
                podManagementPolicy: OrderedReady

  destination:
    server: https://kubernetes.default.svc
    namespace: env-management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
