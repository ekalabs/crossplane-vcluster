
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: env-stage-api-ingress
  namespace: env-stage
spec:
  entryPoints:
    - websecure
  routes:
  - match: HostSNI(`env-stage.appfactory.local`)
    priority: 10
    services:
    - name: env-stage
      namespace: env-stage
      port: 443
  tls:
    passthrough: true