apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: env-stage-vcluster
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    clusterName: env-stage
spec:
  project: default
  sources:
    - path: platform-infra/clusters/stage/ingress
      repoURL: https://github.com/ekalabs/crossplane-vcluster.git
      targetRevision: main
    
    - repoURL: https://charts.loft.sh
      targetRevision: 0.22.0
      chart: vcluster
      helm:
        releaseName: env-stage
        values: |
          pro: false
          exportKubeConfig:
            context: env-stage
            server: https://env-stage.appfactory.local:32443
            secret:
              name: vc-env-stage-ext
              namespace: env-stage
          sync:
            toHost:
              ingresses:
                enabled: true
          controlPlane:
            distro:
              k3s:
                enabled: true
            proxy:
              extraSANs:
              - env-stage
              - env-stage.env-stage
              - env-stage.env-stage.svc
              - env-stage.env-stage.svc.cluster.local
            statefulSet:
              scheduling:
                podManagementPolicy: OrderedReady
                    
  destination:
    server: https://kubernetes.default.svc
    namespace: env-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true