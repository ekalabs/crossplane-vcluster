apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xenvironments.platform.appfactory.io
spec:
  group: platform.appfactory.io
  names:
    kind: XEnvironment
    plural: xenvironments
  claimNames:
    kind: Environment
    plural: environments
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                      enum:
                        - preview
                        - qa
                        - stage
                        - prodlike
                        - prod
                    owner:
                      type: string
                    ttlHours:
                      type: integer
                      minimum: 1
                  required:
                    - name
                    - type
              required:
                - parameters
