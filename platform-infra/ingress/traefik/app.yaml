apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: management-traefik
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 34.0.0
    helm:
      releaseName: traefik
      values: |
        providers:
          kubernetesCRD:
            enabled: true
            allowExternalNameServices: true
            namespaces: []

          kubernetesIngress:
            enabled: true
            namespaces: []
            allowExternalNameServices: true
            publishedService:
              enabled: true

        ports:
          web:
            port: 32080
            nodePort: 32080
          websecure:
            port: 32443
            nodePort: 32443
          traefik:
            port: 32090
            nodePort: 32090

        ingressRoute:
          dashboard:
            enabled: true

        logs:
          access:
            enabled: true

        metrics:
          addInternals: true
          prometheus:
            addEntryPointsLabels: true
            addRoutersLabels: true
            addServicesLabels: true
            entryPoint: traefik

        tracing:
          addInternals: true
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
