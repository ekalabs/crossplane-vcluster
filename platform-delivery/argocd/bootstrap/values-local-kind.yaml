---
global:
  domain: argocd.appfactory.local
configs:
  params:
    server.insecure: "true"
    controller.status.processors: "10"
    controller.operation.processors: "5"
    reposerver.parallelism.limit: "10"
server:
  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.appfactory.local
controller:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
repoServer:
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  livenessProbe:
    initialDelaySeconds: 20
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 20
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 6
