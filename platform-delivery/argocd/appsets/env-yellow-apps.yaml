apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-yellow-apps
  namespace: argo-cd
spec:
  generators:
    - git:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        revision: HEAD
        directories:
          - path: apps/*/*
  template:
    metadata:
      name: yellow-{{path.basename}}
      labels:
        clusterName: env-yellow
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: HEAD
        path: '{{path}}/k8s'
      destination:
        server: https://env-yellow.env-yellow:443
        namespace: crossplane-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
