apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-observability-agents
  namespace: argo-cd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
          matchExpressions:
            - key: clusterName
              operator: In
              values:
                - env-preview
                - env-qa
                - env-stage
                - env-prodlike
                - env-prod
  template:
    metadata:
      name: '{{name}}-prometheus-agent'
      labels:
        clusterName: '{{name}}'
    spec:
      project: default
      source:
        repoURL: https://prometheus-community.github.io/helm-charts
        chart: prometheus
        targetRevision: 26.0.0
        helm:
          releaseName: prometheus-agent
          values: |
            alertmanager:
              enabled: false
            kube-state-metrics:
              enabled: true
            prometheus-pushgateway:
              enabled: false
            server:
              fullnameOverride: prometheus-agent
              persistentVolume:
                enabled: false
              global:
                scrape_interval: 30s
                external_labels:
                  environment: {{name}}
              extraFlags:
                - enable-feature=agent
              service:
                annotations:
                  prometheus.io/scrape: "true"
                  prometheus.io/port: "9090"
                  prometheus.io/path: /metrics
              remoteWrite:
                - url: http://prometheus.env-management.appfactory.local/api/v1/write
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
