apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-preview-apps
  namespace: argo-cd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/ekalabs/crossplane-vcluster.git
              revision: main
              files:
                - path: environment-config/preview/services/*.yaml
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  clusterName: env-preview
  template:
    metadata:
      name: preview-{{appName}}
      labels:
        clusterName: env-preview
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: main
        path: '{{servicePath}}/k8s'
      destination:
        server: '{{server}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
