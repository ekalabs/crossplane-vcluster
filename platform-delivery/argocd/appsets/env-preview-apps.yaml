apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-preview-apps
  namespace: argo-cd
spec:
  generators:
    - git:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        revision: HEAD
        files:
          - path: environment-config/preview/services/*.yaml
  template:
    metadata:
      name: preview-{{appName}}
      labels:
        clusterName: env-preview
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: HEAD
        path: '{{servicePath}}/k8s'
      destination:
        server: https://env-preview.env-preview:443
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
