apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-observability-acl
  namespace: argo-cd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
          matchExpressions:
            - key: clusterName
              operator: In
              values:
                - env-preview
                - env-qa
                - env-stage
                - env-prodlike
                - env-prod
  template:
    metadata:
      name: '{{name}}-observability-acl'
      labels:
        clusterName: '{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: main
        path: platform-security/policies/network/observability-egress
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
