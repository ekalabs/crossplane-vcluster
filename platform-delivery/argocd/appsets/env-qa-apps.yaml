apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-qa-apps
  namespace: argo-cd
spec:
  generators:
    - merge:
        mergeKeys:
          - service
        generators:
          - git:
              repoURL: https://github.com/ekalabs/crossplane-vcluster.git
              revision: HEAD
              files:
                - path: environment-config/qa/services/*.yaml
          - git:
              repoURL: https://github.com/ekalabs/crossplane-vcluster.git
              revision: HEAD
              files:
                - path: promotion-repo/qa/*.yaml
  template:
    metadata:
      name: qa-{{appName}}
      labels:
        clusterName: env-qa
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: HEAD
        path: '{{servicePath}}/k8s'
      destination:
        server: https://env-qa.env-qa:443
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
