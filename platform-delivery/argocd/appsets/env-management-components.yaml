apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-management-components
  namespace: argo-cd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/ekalabs/crossplane-vcluster.git
              revision: main
              directories:
                - path: platform-security/identity/*
                - path: platform-security/secrets/*
                - path: developer-platform/observability
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  clusterName: env-management
  template:
    metadata:
      name: mgmt-{{path.basename}}
      labels:
        clusterName: env-management
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: '{{server}}'
        namespace: crossplane-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
