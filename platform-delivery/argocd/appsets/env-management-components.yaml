apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-management-components
  namespace: argo-cd
spec:
  generators:
    - git:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        revision: HEAD
        directories:
          - path: platform-security/identity/*
          - path: platform-security/secrets/*
  template:
    metadata:
      name: mgmt-{{path.basename}}
      labels:
        clusterName: env-management
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://env-management.env-management:443
        namespace: crossplane-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
