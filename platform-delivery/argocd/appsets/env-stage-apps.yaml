apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-stage-apps
  namespace: argo-cd
spec:
  generators:
    - merge:
        mergeKeys:
          - service
        generators:
          - git:
              repoURL: https://github.com/ekalabs/crossplane-vcluster.git
              revision: feat/argo-crossplane-preview-qa-stage-prod-migration
              files:
                - path: environment-config/stage/services/*.yaml
          - git:
              repoURL: https://github.com/ekalabs/crossplane-vcluster.git
              revision: feat/argo-crossplane-preview-qa-stage-prod-migration
              files:
                - path: promotion-repo/stage/*.yaml
  template:
    metadata:
      name: stage-{{appName}}
      labels:
        clusterName: env-stage
    spec:
      project: default
      source:
        repoURL: https://github.com/ekalabs/crossplane-vcluster.git
        targetRevision: feat/argo-crossplane-preview-qa-stage-prod-migration
        path: '{{servicePath}}/k8s'
      destination:
        server: https://env-stage.env-stage:443
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
